name: guerre_news

services:
  db:
    image: postgres:16-alpine
    container_name: guerre_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: guerre_news
      POSTGRES_USER: guerre_user
      POSTGRES_PASSWORD: guerre_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guerre_user -d guerre_news"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  frontoffice-php:
    image: php:8.3-fpm-alpine
    container_name: guerre_frontoffice_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./frontoffice:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: guerre_news
      DB_USER: guerre_user
      DB_PASSWORD: guerre_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  frontoffice-nginx:
    image: nginx:1.27-alpine
    container_name: guerre_frontoffice_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontoffice:/var/www/html:ro
      - ./frontoffice/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontoffice-php
    networks:
      - appnet

  backoffice-php:
    image: php:8.3-fpm-alpine
    container_name: guerre_backoffice_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backoffice:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: guerre_news
      DB_USER: guerre_user
      DB_PASSWORD: guerre_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  backoffice-nginx:
    image: nginx:1.27-alpine
    container_name: guerre_backoffice_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./backoffice:/var/www/html:ro
      - ./backoffice/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backoffice-php
    networks:
      - appnet

volumes:
  postgres_data:

networks:
  appnet:
